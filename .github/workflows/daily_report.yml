name: 📊 中证500每日复盘

on:
  schedule:
    # 北京时间 15:00 = UTC 07:00，周一至周五
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  analysis:
    name: 运行复盘分析
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-zenhei
          # 清除 matplotlib 字体缓存
          python -c "import matplotlib; import shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True)"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 运行分析管线
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python main.py

      - name: 📎 上传报告和图表 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
          retention-days: 7

      - name: 完成通知
        run: echo "✅ 中证500每日复盘分析完成！"
