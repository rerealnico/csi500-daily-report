name: 📊 中证500每日复盘

on:
  schedule:
    # 北京时间 15:00 = UTC 07:00，周一至周五
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  analysis:
    name: 运行复盘分析
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 获取缓存键
        run: echo "CACHE_KEY=klines-$(date +%Y%U)" >> $GITHUB_ENV

      - name: 恢复数据缓存
        uses: actions/cache@v4
        with:
          path: data/
          key: ${{ env.CACHE_KEY }}
          restore-keys: |
            klines-

      - name: 准备环境（字体 + Python 依赖）
        run: |
          set +e
          sudo apt-get update -qq 2>/dev/null
          sudo apt-get install -y fonts-wqy-zenhei 2>/dev/null
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import matplotlib; import shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True)"

      - name: 🚀 运行分析管线
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python main.py

      - name: ☁️ 部署到 Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler pages deploy reports/ \
            --project-name csi500-daily-report \
            --branch main

      - name: 完成通知
        run: |
          echo "✅ 中证500每日复盘分析完成！"
          echo "☁️ Cloudflare Pages: https://csi500-daily-report.pages.dev/report.html"
